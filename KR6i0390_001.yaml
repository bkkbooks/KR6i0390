body:
  text: 大周于闐國三藏沙門實叉難陀等奉制譯如是我聞一時佛在舍衛國祇樹給孤獨園與大比丘僧及餘無量衆俱前後圍繞爾時長老舍利弗即從坐起偏袒右肩右膝著地合掌向佛以偈請曰大威德世尊願為我等說右繞於佛塔所得之果報爾時世尊以偈答曰右繞於佛塔所得諸功德我今說少分汝等咸善聽一切諸天龍夜叉鬼神等皆親近供養斯由右繞塔在在所生處遠離於八難常生無難處斯由右繞塔於一切生處念慧常無失具足妙色相斯由右繞塔往來天人中福命悉長遠常獲大名稱斯由右繞塔在於閻浮提常生最尊勝清淨種姓中斯由右繞塔儀貌常端正富貴多財寶恆食大封邑斯由右繞塔財寶常盈積而無慳吝心勇猛廣惠施斯由右繞塔色相淨微妙見者皆欣仰所住常安樂斯由右繞塔或為忉利王妻子悉具足威勢力自在斯由右繞塔或作婆羅門持戒善通達呪術圍陀典斯由右繞塔或作大長者豪貴多財産倉廩常豐足斯由右繞塔或作正法王自在王閻浮率土咸歸化斯由右繞塔或為具七寶大勢轉輪王十善御群生斯由右繞塔從此生天上常有大威德淨信於佛法斯由右繞塔淨信速成已於法無迷惑見諸行皆空斯由右繞塔從天上捨命下生於人中入胎不迷亂斯由右繞塔在於母胎中垢穢所不染如淨摩尼珠斯由右繞塔在胎及生時令母常安樂飲乳亦復然斯由右繞塔父母及親戚一切共鞠養乳母常不離斯由右繞塔眷屬皆愛念超過於父母資財自增長斯由右繞塔夜叉諸惡鬼不能暫驚怖所須自然得斯由右繞塔經於百千劫其身轉清淨妙色相成滿斯由右繞塔淨眼修且廣猶如青蓮花兼得淨天眼斯由右繞塔妙色常圓滿諸相自莊嚴成就大勢力斯由右繞塔或生帝釋宮大威勢自在忉利天中尊斯由右繞塔或生須夜摩兜率陀天宮化樂及他化斯由右繞塔或復生梵天梵世最自在諸天常供養斯由右繞塔億那由他劫常為諸智人恭敬而供養斯由右繞塔其身及衣服億劫常無垢具足白淨法斯由右繞塔具大精進力勤修種種行未嘗有疲懈斯由右繞塔勇猛常精進堅固不可壞所作速成就斯由右繞塔深遠微妙音聞者皆歡喜安樂常無病斯由右繞塔如我所演說厭捨三有苦成就出世智斯由右繞塔常在四念處及以四正勤四如意神足斯由右繞塔了達四真諦根力七覺分正道及聖果斯由右繞塔滅一切煩惱具足大威德無漏六神通斯由右繞塔永離貪恚癡及一切障礙證獨覺菩提斯由右繞塔得妙紫金色相好莊嚴身現作天人師斯由右繞塔皆由以身業及語業讚歎右繞於佛塔獲此大利益右繞諸佛塔所得諸功德我今隨所聞略說詎能盡爾時世尊說此偈已舍利弗等一切衆會皆大歡喜信受奉行
